<html>
    <head>
        <title>Types of List</title>
    </head>
<body>
    
    <h2>Ordered List</h2>
    <ol>
        <li>Bread</li>
        <li>Milk</li>
        <li>Eggs</li>
        <li>Butter</li>

    </ol>
    <h2>Unordered List</h2>   

    <ul>
        <li>Apples</li>
        <li>Oranges</li>
        <li>Bananas</li>
        <li>Grapes</li>
    </ul>
  <h2>Physics  </h2> 
  <dl>
<dt>Matter</dt>
<dd>Anything that has mass and takes up space</dd>

  </dl> 
  
</body>
</html>
